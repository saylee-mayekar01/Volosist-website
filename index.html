      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
      }

      .noise-bg {
        position: fixed;
        inset: 0;
        z-index: 50;
        opacity: 0.03;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .mesh-gradient {
        background-color: #f8fafc;
        background-image: 
          radial-gradient(at 0% 0%, hsla(210, 100%, 93%, 1) 0, transparent 60%), 
          radial-gradient(at 100% 0%, hsla(260, 100%, 93%, 1) 0, transparent 60%), 
          radial-gradient(at 50% 50%, hsla(220, 100%, 96%, 1) 0, transparent 50%),
          radial-gradient(at 50% 100%, hsla(190, 100%, 94%, 1) 0, transparent 60%),
          radial-gradient(at 0% 100%, hsla(280, 100%, 95%, 1) 0, transparent 60%),
          radial-gradient(at 100% 100%, hsla(200, 100%, 95%, 1) 0, transparent 60%);
        background-attachment: fixed;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
